version: '3'

tasks:
  migrate:
    desc: "Run database migrations"
    cmds:
      - go run ./cmd/migrator --storage-path=./storage/sso.db --migrations-path=./migrations
  
  migrate-up:
    desc: "Apply all pending migrations (same as migrate)"
    cmds:
      - go run ./cmd/migrator --storage-path=./storage/sso.db --migrations-path=./migrations

  migrate-down:
    desc: "Rollback last migration (if you add --down flag to your code)"
    cmds:
      - go run ./cmd/migrator --storage-path=./storage/sso.db --migrations-path=./migrations --down
  
  migrate-force:
    desc: "Force set migration version"
    cmds:
      - go run ./cmd/migrator --storage-path=./storage/sso.db --migrations-path=./migrations --force {{.CLI_ARGS}}
  migrate-test:
    desc: "Migrate go test"
    cmds:
      - go run ./cmd/migrator/main.go --storage-path=./storage/sso.db --migrations-path=./tests/migrations --migrations-table=migrations_test